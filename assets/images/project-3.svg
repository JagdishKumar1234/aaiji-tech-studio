<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <filter id="shadow3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="800" fill="url(#bg3)"/>
  <g filter="url(#shadow3)">
    <rect x="120" y="120" rx="34" ry="34" width="960" height="560" fill="url(#panel)"/>
  </g>
  <rect x="170" y="175" rx="16" ry="16" width="860" height="70" fill="#ffffff" opacity="0.12"/>
  <rect x="170" y="275" rx="18" ry="18" width="560" height="350" fill="#ffffff" opacity="0.10"/>
  <rect x="750" y="275" rx="18" ry="18" width="280" height="160" fill="#ffffff" opacity="0.10"/>
  <rect x="750" y="465" rx="18" ry="18" width="280" height="160" fill="#ffffff" opacity="0.10"/>
  <text x="170" y="105" font-family="Poppins, system-ui, -apple-system, Segoe UI, Arial" font-size="28" fill="#ffffff" opacity="0.9">Project Preview</text>
  <text x="170" y="720" font-family="Poppins, system-ui, -apple-system, Segoe UI, Arial" font-size="18" fill="#ffffff" opacity="0.85">Replace with website screenshot</text>
</svg>
